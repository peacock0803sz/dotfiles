on:
  workflow_dispatch:
  schedule:
    - cron: 0 16 * * * # everyday 01:00 JST
defaults:
  run:
    shell: bash

jobs:
  find:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.find.outputs.dirs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: find
        run: |
          dirs=$(find . -name flake.nix -printf '%h\n' | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  update:
    needs: find
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        dir: ${{ fromJSON(needs.find.outputs.dirs) }}
    permissions:
      contents: write
    env:
      GIT_AUTHOR_NAME: "peaock0803sz"
      GIT_AUTHOR_EMAIL: "33555487+peacock0803sz@users.noreply.github.com"
      GIT_COMMITTER_NAME: "github-actions[bot]"
      GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: update flake - ${{ matrix.dir }}
        working-directory: ${{ matrix.dir }}
        run: |
          nix flake update

          if [[ $(git status --untracked-files --short) ]]; then
            dir="${{ matrix.dir }}"
            label="${dir#./}"
            if [[ "$label" == "." ]]; then
              label="root"
            fi
            git add flake.lock
            git commit -m "Update ${label} flake.lock"
            git pull --rebase origin master
            git push origin HEAD
          else
            echo "Nothing to commit"
          fi
