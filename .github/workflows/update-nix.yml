on:
  workflow_dispatch:
    inputs:
      flake-inputs:
        description: 'Space-separated input names (empty = all)'
        type: string
        required: false
        default: ''
  schedule:
    - cron: 0 16 * * * # everyday 01:00 JST

jobs:
  call:
    uses: ./.github/workflows/update-flake.yml
    permissions:
      contents: write
      # pull-requests: write  # uncomment when create-pr=true
    with:
      flake-inputs: ${{ inputs.flake-inputs || '' }}
      git-author-name: 'peacock0803sz'
      git-author-email: '33555487+peacock0803sz@users.noreply.github.com'
      create-pr: false
      minimum-release-age-days: 3
      # auto-merge: true  # ignored while create-pr=false
